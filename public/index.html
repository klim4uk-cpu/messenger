<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram-style Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Сайдбар как в Telegram -->
        <div class="sidebar">
            <div class="profile-header">
                <div class="user-info">
                    <div class="avatar" id="user-avatar">👤</div>
                    <div class="user-details">
                        <input type="text" id="username-input" placeholder="Введите ваше имя" maxlength="30">
                        <button id="set-username">Продолжить</button>
                    </div>
                </div>
            </div>
            
            <div class="contacts-section">
                <div class="contacts-header">
                    Контакты · <span id="online-count">0</span> онлайн
                </div>
                <ul id="users-list"></ul>
            </div>
        </div>
        
        <!-- Основной чат -->
        <div class="chat">
            <div class="chat-header">
                <div class="avatar" id="chat-avatar">💬</div>
                <h2>Общий чат</h2>
                <div class="chat-header-status" id="chat-status"></div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="typing-status" id="typing-status"></div>
            
            <div class="message-input">
                <textarea id="message-text" placeholder="Написать сообщение..." rows="1"></textarea>
                <button id="send-message">➤</button>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
